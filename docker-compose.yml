services:
  postgres:
    image: postgres:16-alpine
    container_name: bozorcheck-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bozorcheck}
      POSTGRES_USER: ${POSTGRES_USER:-bozorcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bozorcheck_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bozorcheck} -d ${POSTGRES_DB:-bozorcheck}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - bozorcheck-postgres-data:/var/lib/postgresql/data

volumes:
  bozorcheck-postgres-data:
